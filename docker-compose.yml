services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./storage/model-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./storage/model-cache:/root/.cache/huggingface
    command: ["python", "-m", "app.worker"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
